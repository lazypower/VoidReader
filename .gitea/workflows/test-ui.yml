name: UI Tests

on: [push, pull_request]

jobs:
  ui-test:
    name: UI Tests (XCUITest)
    runs-on: apple
    steps:
      - uses: actions/swift-ci-actions/require-gui-session@v1
      - uses: actions/checkout@v4
      - uses: actions/swift-ci-actions/setup-swift-project@v1
      - name: Kill stale VoidReader instances
        run: killall VoidReader || true
      - uses: actions/swift-ci-actions/xcode-test@v1
        with:
          scheme: VoidReader
          # ScrollPercentageUITests excluded — they require keyboard-driven
          # scrolling in the reader view, which the app doesn't currently
          # implement (no .onKeyPress(.pageDown) on the reader ScrollView).
          # See chuck/VoidReader#2.
          only-testing: |
            VoidReaderUITests/LargeDocumentTests
          result-bundle-path: TestResults/ui.xcresult

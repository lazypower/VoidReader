name: UI Tests

on: [push, pull_request]

jobs:
  ui-test:
    name: UI Tests (XCUITest)
    runs-on: apple
    steps:
      - uses: actions/checkout@v4

      - name: Require GUI session
        run: |
          if ! pgrep -x WindowServer > /dev/null 2>&1; then
            echo "::error::No GUI session — WindowServer is not running. VNC in and log in to restore the session."
            exit 1
          fi
          echo "WindowServer is running — GUI session available"

      - name: Dump session diagnostics
        run: |
          echo "=== User ==="
          id
          echo "=== Security Session ==="
          security session-info 2>&1 || true
          echo "=== Session Env ==="
          env | grep -iE 'session|display|aqua|window|apple|xpc' | sort || true
          echo "=== Process Tree ==="
          ps -eo pid,ppid,sess,tty,comm | grep -E '(act_runner|xcodebuild|bash|zsh|PID)' || true
          echo "=== Keychain Search List ==="
          security list-keychains -d user

      - name: Generate Xcode project
        run: make project

      - name: Run UI tests
        run: |
          # Get the security session ID from the GUI login session
          GUI_SESSION=$(launchctl asuser $(id -u) launchctl getenv SECURITYSESSIONID 2>/dev/null || \
            ps -eo pid,comm | grep -m1 Finder | awk '{print $1}' | xargs -I{} /bin/launchctl procinfo {} 2>/dev/null | grep session || true)

          # Run xcodebuild via osascript to inherit the full GUI session
          osascript -e "
            do shell script \"cd $GITHUB_WORKSPACE && xcodebuild -scheme VoidReader -configuration Debug test -only-testing:VoidReaderUITests -resultBundlePath TestResults/ui.xcresult -quiet 2>&1\"
          "
